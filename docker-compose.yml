version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: finscope-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: finscope
      CLICKHOUSE_PASSWORD: ""  # Burayı tırnak içinde boş bırak
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1 # Bu satırı ekle (yönetim yetkisi için)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7-alpine
    container_name: finscope-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  clickhouse_data:
  redis_data: